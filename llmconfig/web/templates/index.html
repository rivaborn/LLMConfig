<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLMConfig</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <div class="brand">LLM<span>Config</span></div>
    <p class="hint header-hint">Each GPU lane runs one model at a time (Ollama ⇄ vLLM); lanes are independent.</p>
    <details class="keybox">
      <summary>⚙</summary>
      <label>API key <input id="apikey" type="password" placeholder="X-API-Key (if set)" /></label>
    </details>
  </header>

  <main>
    <div id="lanes" class="lanes"></div>

    <aside class="activity">
      <h2>Activity</h2>
      <pre id="log" class="log">idle</pre>
    </aside>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
